<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spy Game - AAA Experience</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <button id="leaveBtn" class="btn-leave hidden">🚪 مغادرة اللعبة</button>
    
    <button id="hostSettingsBtn" class="btn-settings hidden">⚙️ إعدادات الغرفة</button>

    <div class="glass-container">
        
        <div id="homeScreen" class="screen active">
            <h1 class="neon-text">SPY GAME</h1>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="اكتب اسمك هنا..." autocomplete="off">
            </div>
            <div class="action-buttons">
                <button id="createRoomBtn" class="btn-neon">إنشاء غرفة جديدة</button>
                <div class="divider">أو</div>
                <input type="text" id="roomCodeInput" placeholder="كود الغرفة..." autocomplete="off">
                <button id="joinRoomBtn" class="btn-neon outline">انضمام لغرفة</button>
            </div>
        </div>

        <div id="lobbyScreen" class="screen hidden">
            <h2 class="neon-text">غرفة الانتظار</h2>
            <div class="room-info">
                <span>كود الغرفة: </span>
                <strong id="displayRoomCode" class="highlight">---</strong>
            </div>
            <ul id="playersList" class="players-list">
                </ul>
            <button id="startGameBtn" class="btn-neon hidden">🚀 ابدأ اللعبة</button>
        </div>

        <div id="gameScreen" class="screen hidden">
            <h2 class="neon-text">المهمة بدأت</h2>
            <div id="wordDisplay" class="word-card glass-panel">
                </div>
            
            <div class="voting-section">
                <h3>صوّت ضد الجاسوس:</h3>
                <ul id="votingList" class="players-list vote-mode">
                    </ul>
            </div>

            <div id="liveFeed" class="live-feed glass-panel">
                </div>
        </div>

    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
